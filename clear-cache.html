<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Limpiar Caché - GeoEscape</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark, #1a1a2e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
            padding: 2rem;
            position: relative;
        }
        
        .card {
            background: var(--bg-panel, #16213e);
            border: 2px solid var(--accent, #e94560);
            border-radius: 16px;
            padding: 3rem 2rem;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
            animation: cardAppear 0.6s ease-out;
        }
        
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent, #e94560);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 3rem;
            animation: iconPulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .title {
            color: var(--accent, #e94560);
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .message {
            color: var(--text, #ecf0f1);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--accent, #e94560);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            width: 100%;
        }
        
        .btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: var(--btn-secondary, #0f3460);
            margin-top: 1rem;
        }
        
        .btn-secondary:hover {
            background: #1a4a8c;
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent, #e94560);
            border-radius: 50%;
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }
        
        .logo {
            font-size: 1.5rem;
            color: var(--accent, #e94560);
            margin-bottom: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }
            .title {
                font-size: 1.5rem;
            }
            .icon-circle {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particles">
        <div class="particle" style="left: 5%; animation-delay: 0s; animation-duration: 8s;"></div>
        <div class="particle" style="left: 15%; animation-delay: 1s; animation-duration: 10s;"></div>
        <div class="particle" style="left: 25%; animation-delay: 2s; animation-duration: 7s;"></div>
        <div class="particle" style="left: 35%; animation-delay: 3s; animation-duration: 9s;"></div>
        <div class="particle" style="left: 45%; animation-delay: 4s; animation-duration: 11s;"></div>
        <div class="particle" style="left: 55%; animation-delay: 5s; animation-duration: 8s;"></div>
        <div class="particle" style="left: 65%; animation-delay: 6s; animation-duration: 10s;"></div>
        <div class="particle" style="left: 75%; animation-delay: 7s; animation-duration: 7s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 0.5s; animation-duration: 9s;"></div>
        <div class="particle" style="left: 95%; animation-delay: 1.5s; animation-duration: 11s;"></div>
    </div>
    
    <div class="container">
        <div class="logo">GEOESCAPE</div>
        
        <div class="card" id="main-card">
            <div class="icon-circle">
                <i class="fa-solid fa-broom"></i>
            </div>
            
            <h1 class="title">Limpiar Caché</h1>
            
            <p class="message" id="message">
                Esto eliminará el caché del Service Worker y forzará la descarga de los archivos más recientes.
            </p>
            
            <button class="btn" id="clear-btn" onclick="clearCache()">
                Limpiar Caché
            </button>
            
            <a href="/index.html" class="btn btn-secondary" id="home-btn" style="display:none;">
                Volver al Inicio
            </a>
        </div>
    </div>
    
    <script>
        async function clearCache() {
            const btn = document.getElementById('clear-btn');
            const msg = document.getElementById('message');
            const homeBtn = document.getElementById('home-btn');
            
            btn.disabled = true;
            btn.textContent = 'Limpiando...';
            
            try {
                // Unregister service workers
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(reg => reg.unregister()));
                }
                
                // Clear all caches
                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map(key => caches.delete(key)));
                }
                
                msg.innerHTML = '<i class="fa-solid fa-check"></i> <strong>Caché limpiado correctamente.</strong><br>Los archivos se descargarán de nuevo al entrar a la aplicación.';
                btn.style.display = 'none';
                homeBtn.style.display = 'inline-block';
                
            } catch (e) {
                msg.innerHTML = '<i class="fa-solid fa-xmark"></i> <strong>Error al limpiar:</strong><br>' + e.message;
                btn.disabled = false;
                btn.textContent = 'Reintentar';
            }
        }
    </script>
    <script src="js/cookie-banner.js"></script>
</body>
</html>
