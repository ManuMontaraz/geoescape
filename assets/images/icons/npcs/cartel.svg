<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow on ground -->
  <ellipse cx="32" cy="58" rx="22" ry="5" fill="#111" opacity="0.3" stroke="none"/>

  <!-- Post -->
  <rect x="28" y="20" width="8" height="38" rx="1" fill="#8B5A2B" stroke="#333" stroke-width="1.5"/>
  <!-- Wood grain lines on post -->
  <line x1="30" y1="22" x2="30" y2="56" stroke="#5C3A1E" stroke-width="0.8"/>
  <line x1="33" y1="22" x2="33" y2="56" stroke="#5C3A1E" stroke-width="0.8"/>
  <line x1="34" y1="22" x2="34" y2="56" stroke="#5C3A1E" stroke-width="0.5"/>

  <!-- Grass tufts at base -->
  <path d="M 18 56 Q 20 50 22 56" stroke="#27ae60" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 20 57 Q 22 48 24 57" stroke="#2ecc71" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 40 56 Q 42 50 44 56" stroke="#27ae60" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 42 57 Q 44 48 46 57" stroke="#2ecc71" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 26 57 Q 28 49 30 57" stroke="#27ae60" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Sign board -->
  <rect x="6" y="6" width="52" height="22" rx="3" fill="#DEB887" stroke="#333" stroke-width="1.5"/>
  <!-- Board wood grain -->
  <line x1="6" y1="12" x2="58" y2="12" stroke="#C49A6C" stroke-width="0.6"/>
  <line x1="6" y1="18" x2="58" y2="18" stroke="#C49A6C" stroke-width="0.6"/>
  <line x1="6" y1="24" x2="58" y2="24" stroke="#C49A6C" stroke-width="0.6"/>

  <!-- Nails on sign -->
  <circle cx="10" cy="10" r="1.5" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>
  <circle cx="54" cy="10" r="1.5" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>
  <circle cx="10" cy="24" r="1.5" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>
  <circle cx="54" cy="24" r="1.5" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>

  <!-- Sign text lines (simulated) -->
  <line x1="14" y1="13" x2="44" y2="13" stroke="#5C3A1E" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14" y1="17" x2="38" y2="17" stroke="#5C3A1E" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="14" y1="21" x2="50" y2="21" stroke="#5C3A1E" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Post cap (top of post visible above sign) -->
  <rect x="27" y="18" width="10" height="3" rx="1" fill="#6B4226" stroke="#333" stroke-width="1"/>
</svg>