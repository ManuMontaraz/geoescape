<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Pelo corto oscuro -->
  <path d="M 22 18 Q 22 8 32 8 Q 42 8 42 18 Q 42 12 32 12 Q 22 12 22 18" fill="#2c3e50" stroke="#111" stroke-width="1.2"/>
  <!-- Cabeza -->
  <ellipse cx="32" cy="22" rx="10" ry="11" fill="#f5cda0" stroke="#333" stroke-width="1.5"/>
  <!-- Ojos -->
  <circle cx="28" cy="20" r="1.8" fill="#333"/>
  <circle cx="36" cy="20" r="1.8" fill="#333"/>
  <!-- Boca -->
  <path d="M 28 26 Q 32 29 36 26" stroke="#333" stroke-width="1.2" fill="none"/>
  <!-- Casco/armadura superior -->
  <rect x="18" y="32" width="28" height="12" rx="4" fill="#7f8c8d" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Escudo dorado en pecho -->
  <rect x="26" y="35" width="12" height="8" rx="2" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Armadura inferior -->
  <rect x="20" y="44" width="24" height="10" rx="3" fill="#95a5a6" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Piernas -->
  <rect x="22" y="50" width="8" height="10" rx="3" fill="#34495e" stroke="#2c3e50" stroke-width="1.5"/>
  <rect x="34" y="50" width="8" height="10" rx="3" fill="#34495e" stroke="#2c3e50" stroke-width="1.5"/>
  <!-- Lanza/escudo lateral -->
  <rect x="48" y="24" width="3" height="30" rx="1.5" fill="#7f8c8d" stroke="#2c3e50" stroke-width="1"/>
  <polygon points="49.5,18 52,24 47,24" fill="#95a5a6" stroke="#2c3e50" stroke-width="1"/>
</svg>
