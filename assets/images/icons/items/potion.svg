<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sombra -->
  <ellipse cx="34" cy="58" rx="10" ry="3" fill="#000" opacity="0.15"/>
  <!-- Cuerpo del frasco -->
  <path d="M 22 24 L 20 50 Q 20 56 32 56 Q 44 56 44 50 L 42 24 Z" fill="#e74c3c" stroke="#333" stroke-width="1.5"/>
  <!-- Líquido superior (meniscus) -->
  <ellipse cx="32" cy="24" rx="10" ry="3" fill="#c0392b" stroke="#333" stroke-width="1"/>
  <!-- Cuello estrecho -->
  <rect x="26" y="14" width="12" height="10" fill="#e74c3c" stroke="#333" stroke-width="1.5"/>
  <!-- Tapón de corcho -->
  <rect x="25" y="8" width="14" height="8" rx="2" fill="#8d6e63" stroke="#5d4037" stroke-width="1.5"/>
  <!-- Detalle corcho -->
  <line x1="28" y1="10" x2="36" y2="10" stroke="#5d4037" stroke-width="0.8"/>
  <line x1="28" y1="12" x2="36" y2="12" stroke="#5d4037" stroke-width="0.8"/>
  <!-- Burbuja interior -->
  <circle cx="36" cy="38" r="3" fill="#fff" opacity="0.5" stroke="#c0392b" stroke-width="0.5"/>
  <!-- Burbuja pequeña -->
  <circle cx="30" cy="44" r="1.5" fill="#fff" opacity="0.4"/>
  <!-- Etiqueta -->
  <rect x="24" y="32" width="16" height="10" rx="1" fill="#f5deb3" stroke="#d4a373" stroke-width="1"/>
  <!-- Línea etiqueta -->
  <line x1="26" y1="36" x2="38" y2="36" stroke="#8d6e63" stroke-width="0.8"/>
  <!-- Brillo en cristal -->
  <path d="M 24 28 Q 26 24 28 28" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>
