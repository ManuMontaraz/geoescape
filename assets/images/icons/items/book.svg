<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sombra -->
  <ellipse cx="34" cy="58" rx="14" ry="3" fill="#000" opacity="0.15"/>
  <!-- Lomo del libro (lado izquierdo) -->
  <rect x="12" y="10" width="10" height="44" rx="2" fill="#5d4037" stroke="#333" stroke-width="1.5"/>
  <!-- Detalle lomo (líneas decorativas) -->
  <line x1="16" y1="14" x2="16" y2="20" stroke="#f1c40f" stroke-width="1.5"/>
  <line x1="16" y1="26" x2="16" y2="32" stroke="#f1c40f" stroke-width="1.5"/>
  <line x1="16" y1="38" x2="16" y2="44" stroke="#f1c40f" stroke-width="1.5"/>
  <!-- Tapa delantera -->
  <rect x="22" y="10" width="30" height="44" rx="2" fill="#8e44ad" stroke="#333" stroke-width="1.5"/>
  <!-- Borde tapa -->
  <rect x="24" y="12" width="26" height="40" rx="1" fill="none" stroke="#6c3483" stroke-width="1"/>
  <!-- Broche/gema en centro -->
  <circle cx="37" cy="32" r="6" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1.5"/>
  <circle cx="37" cy="32" r="3" fill="#e74c3c" stroke="#333" stroke-width="1"/>
  <!-- Páginas (borde inferior) -->
  <rect x="24" y="50" width="26" height="6" rx="1" fill="#f5deb3" stroke="#d4a373" stroke-width="1"/>
  <!-- Líneas de páginas -->
  <line x1="26" y1="52" x2="48" y2="52" stroke="#d4a373" stroke-width="0.6"/>
  <line x1="26" y1="54" x2="48" y2="54" stroke="#d4a373" stroke-width="0.6"/>
  <!-- Esquina decorativa superior derecha -->
  <path d="M 44 14 L 48 14 L 48 18" stroke="#f1c40f" stroke-width="1.5" fill="none"/>
  <!-- Esquina decorativa inferior derecha -->
  <path d="M 48 46 L 48 50 L 44 50" stroke="#f1c40f" stroke-width="1.5" fill="none"/>
</svg>
