<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sombra -->
  <ellipse cx="34" cy="58" rx="16" ry="3" fill="#000" opacity="0.15"/>
  <!-- Cuerpo base madera -->
  <rect x="10" y="22" width="44" height="30" rx="3" fill="#8d6e63" stroke="#333" stroke-width="1.5"/>
  <!-- Tapa abombada -->
  <path d="M 10 22 Q 32 8 54 22" fill="#a1887f" stroke="#333" stroke-width="1.5"/>
  <!-- Línea divisoria tapa-cuerpo -->
  <line x1="10" y1="22" x2="54" y2="22" stroke="#333" stroke-width="1.5"/>
  <!-- Banda metálica superior -->
  <rect x="8" y="18" width="48" height="6" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Banda metálica inferior -->
  <rect x="8" y="46" width="48" height="6" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Banda metálica media -->
  <rect x="8" y="32" width="48" height="6" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Cerradura -->
  <rect x="26" y="36" width="12" height="10" rx="2" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Ojo de la cerradura -->
  <circle cx="32" cy="40" r="2" fill="#333"/>
  <rect x="31" y="40" width="2" height="4" fill="#333"/>
  <!-- Bisagra izquierda -->
  <rect x="6" y="26" width="4" height="6" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <rect x="6" y="38" width="4" height="6" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Bisagra derecha -->
  <rect x="54" y="26" width="4" height="6" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <rect x="54" y="38" width="4" height="6" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Detalle madera -->
  <line x1="18" y1="26" x2="18" y2="48" stroke="#5d4037" stroke-width="0.8"/>
  <line x1="46" y1="26" x2="46" y2="48" stroke="#5d4037" stroke-width="0.8"/>
</svg>
