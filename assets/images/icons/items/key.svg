  <rect x="36" y="42" width="6" height="4" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
  <!-- Diente 2 -->
  <rect x="38" y="36" width="6" height="4" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
  <!-- Diente 3 -->
  <rect x="40" y="30" width="6" height="4" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
  <!-- Cabeza ornamental (arco exterior) -->
