  <line x1="24" y1="16" x2="18" y2="6" stroke="#7f8c8d" stroke-width="2" stroke-linecap="round"/>
  <!-- Antena derecha -->
  <line x1="40" y1="16" x2="46" y2="6" stroke="#7f8c8d" stroke-width="2" stroke-linecap="round"/>
