<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sombra -->
  <ellipse cx="34" cy="60" rx="16" ry="2" fill="#000" opacity="0.15"/>
  <!-- Barandilla izquierda -->
  <rect x="12" y="8" width="4" height="50" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1.5"/>
  <!-- Barandilla derecha -->
  <rect x="48" y="4" width="4" height="54" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1.5"/>
  <!-- Peldanio 1 (superior) -->
  <rect x="12" y="10" width="40" height="6" rx="1" fill="#95a5a6" stroke="#333" stroke-width="1"/>
  <!-- Peldanio 2 -->
  <rect x="12" y="22" width="40" height="6" rx="1" fill="#95a5a6" stroke="#333" stroke-width="1"/>
  <!-- Peldanio 3 -->
  <rect x="12" y="34" width="40" height="6" rx="1" fill="#95a5a6" stroke="#333" stroke-width="1"/>
  <!-- Peldanio 4 (inferior) -->
  <rect x="12" y="46" width="40" height="6" rx="1" fill="#95a5a6" stroke="#333" stroke-width="1"/>
  <!-- Detalle peldanios -->
  <line x1="20" y1="10" x2="20" y2="16" stroke="#7f8c8d" stroke-width="0.5"/>
  <line x1="28" y1="10" x2="28" y2="16" stroke="#7f8c8d" stroke-width="0.5"/>
  <line x1="36" y1="10" x2="36" y2="16" stroke="#7f8c8d" stroke-width="0.5"/>
  <line x1="44" y1="10" x2="44" y2="16" stroke="#7f8c8d" stroke-width="0.5"/>
</svg>
