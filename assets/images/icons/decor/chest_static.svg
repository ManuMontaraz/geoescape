<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sombra -->
  <ellipse cx="34" cy="60" rx="16" ry="2" fill="#000" opacity="0.15"/>
  <!-- Base plana -->
  <rect x="10" y="52" width="44" height="6" rx="2" fill="#5d4037" stroke="#333" stroke-width="1.5"/>
  <!-- Cuerpo arca -->
  <rect x="12" y="18" width="40" height="34" rx="3" fill="#8d6e63" stroke="#333" stroke-width="1.5"/>
  <!-- Tapa curva -->
  <path d="M 12 18 Q 32 6 52 18" fill="#a1887f" stroke="#333" stroke-width="1.5"/>
  <!-- Línea divisoria tapa -->
  <line x1="12" y1="18" x2="52" y2="18" stroke="#333" stroke-width="1.5"/>
  <!-- Bandas metálicas -->
  <rect x="10" y="24" width="44" height="4" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <rect x="10" y="40" width="44" height="4" rx="1" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <!-- Cerradura -->
  <rect x="26" y="30" width="12" height="8" rx="2" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <circle cx="32" cy="34" r="2" fill="#333"/>
  <rect x="31" y="34" width="2" height="3" fill="#333"/>
  <!-- Detalle madera -->
  <line x1="20" y1="22" x2="20" y2="50" stroke="#5d4037" stroke-width="0.8"/>
  <line x1="32" y1="22" x2="32" y2="50" stroke="#5d4037" stroke-width="0.8"/>
  <line x1="44" y1="22" x2="44" y2="50" stroke="#5d4037" stroke-width="0.8"/>
</svg>
