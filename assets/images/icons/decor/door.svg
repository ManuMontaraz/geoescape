<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sombra -->
  <ellipse cx="34" cy="60" rx="16" ry="2" fill="#000" opacity="0.15"/>
  <!-- Marco exterior -->
  <rect x="12" y="4" width="40" height="56" rx="2" fill="#5d4037" stroke="#333" stroke-width="1.5"/>
  <!-- Marco interior -->
  <rect x="16" y="8" width="32" height="48" rx="1" fill="#795548" stroke="#3e2723" stroke-width="1"/>
  <!-- Tablero de madera -->
  <rect x="18" y="10" width="28" height="44" fill="#8d6e63" stroke="#5d4037" stroke-width="0.5"/>
  <!-- Líneas de madera -->
  <line x1="24" y1="10" x2="24" y2="54" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="32" y1="10" x2="32" y2="54" stroke="#5d4037" stroke-width="0.5"/>
  <line x1="40" y1="10" x2="40" y2="54" stroke="#5d4037" stroke-width="0.5"/>
  <!-- Pomo -->
  <circle cx="42" cy="32" r="3" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1"/>
  <circle cx="42" cy="32" r="1.5" fill="#333"/>
  <!-- Bisagras -->
  <rect x="10" y="14" width="4" height="6" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
  <rect x="10" y="44" width="4" height="6" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
</svg>
