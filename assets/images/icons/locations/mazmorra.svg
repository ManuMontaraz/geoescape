  <line x1="12" y1="24" x2="52" y2="24" stroke="#2c3e50" stroke-width="1"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="#2c3e50" stroke-width="1"/>
  <line x1="12" y1="40" x2="52" y2="40" stroke="#2c3e50" stroke-width="1"/>
  <line x1="12" y1="48" x2="52" y2="48" stroke="#2c3e50" stroke-width="1"/>
  <line x1="22" y1="14" x2="22" y2="24" stroke="#2c3e50" stroke-width="0.8"/>
  <line x1="32" y1="14" x2="32" y2="24" stroke="#2c3e50" stroke-width="0.8"/>
  <line x1="42" y1="14" x2="42" y2="24" stroke="#2c3e50" stroke-width="0.8"/>

  <!-- Iron bars -->
  <line x1="22" y1="28" x2="22" y2="52" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="32" y1="24" x2="32" y2="52" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="42" y1="28" x2="42" y2="52" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="18" y1="36" x2="46" y2="36" stroke="#7f8c8d" stroke-width="1.5"/>
  <line x1="18" y1="44" x2="46" y2="44" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Torches on sides -->
  <rect x="8" y="22" width="3" height="10" rx="0.5" fill="#5C3A1E" stroke="#333" stroke-width="0.8"/>
  <circle cx="9.5" cy="20" r="2.5" fill="#e67e22" stroke="#e74c3c" stroke-width="1"/>
  <circle cx="9.5" cy="19" r="1.5" fill="#f1c40f" opacity="0.8" stroke="none"/>

  <rect x="53" y="22" width="3" height="10" rx="0.5" fill="#5C3A1E" stroke="#333" stroke-width="0.8"/>
  <circle cx="54.5" cy="20" r="2.5" fill="#e67e22" stroke="#e74c3c" stroke-width="1"/>
