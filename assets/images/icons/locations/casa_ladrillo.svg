<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="4" fill="#111" opacity="0.25" stroke="none"/>

  <!-- Brick body -->
  <rect x="14" y="26" width="36" height="26" rx="2" fill="#C0392B" stroke="#333" stroke-width="1.5"/>
  <!-- Brick pattern -->
  <line x1="14" y1="31" x2="50" y2="31" stroke="#922B21" stroke-width="0.8"/>
  <line x1="14" y1="36" x2="50" y2="36" stroke="#922B21" stroke-width="0.8"/>
  <line x1="14" y1="41" x2="50" y2="41" stroke="#922B21" stroke-width="0.8"/>
  <line x1="14" y1="46" x2="50" y2="46" stroke="#922B21" stroke-width="0.8"/>
  <line x1="23" y1="26" x2="23" y2="31" stroke="#922B21" stroke-width="0.8"/>
  <line x1="32" y1="26" x2="32" y2="31" stroke="#922B21" stroke-width="0.8"/>
  <line x1="41" y1="26" x2="41" y2="31" stroke="#922B21" stroke-width="0.8"/>
  <line x1="18" y1="31" x2="18" y2="36" stroke="#922B21" stroke-width="0.8"/>
  <line x1="27" y1="31" x2="27" y2="36" stroke="#922B21" stroke-width="0.8"/>
  <line x1="36" y1="31" x2="36" y2="36" stroke="#922B21" stroke-width="0.8"/>
  <line x1="45" y1="31" x2="45" y2="36" stroke="#922B21" stroke-width="0.8"/>

  <!-- Grey roof -->
  <path d="M 10 26 L 32 10 L 54 26 Z" fill="#7f8c8d" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Roof tiles -->
  <line x1="16" y1="20" x2="48" y2="20" stroke="#5d6d7e" stroke-width="0.8"/>
  <line x1="12" y1="24" x2="52" y2="24" stroke="#5d6d7e" stroke-width="0.8"/>

  <!-- Chimney -->
  <rect x="40" y="14" width="6" height="8" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1.2"/>
  <rect x="39" y="12" width="8" height="3" rx="1" fill="#5d6d7e" stroke="#333" stroke-width="1"/>

  <!-- Door -->
  <rect x="27" y="38" width="10" height="14" rx="1" fill="#5C3A1E" stroke="#333" stroke-width="1.2"/>
  <circle cx="34" cy="45" r="1" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>

  <!-- Window -->
  <rect x="18" y="32" width="6" height="6" rx="1" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <line x1="21" y1="32" x2="21" y2="38" stroke="#333" stroke-width="0.8"/>
  <line x1="18" y1="35" x2="24" y2="35" stroke="#333" stroke-width="0.8"/>

  <!-- Foundation -->
  <rect x="13" y="51" width="38" height="4" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
</svg>