  <line x1="12" y1="28" x2="18" y2="24" stroke="#5d6d7e" stroke-width="1"/>
  <line x1="16" y1="36" x2="20" y2="32" stroke="#5d6d7e" stroke-width="0.8"/>
  <line x1="52" y1="26" x2="46" y2="22" stroke="#5d6d7e" stroke-width="1"/>
  <line x1="48" y1="34" x2="44" y2="30" stroke="#5d6d7e" stroke-width="0.8"/>
  <line x1="24" y1="12" x2="28" y2="16" stroke="#5d6d7e" stroke-width="0.8"/>
  <line x1="40" y1="12" x2="36" y2="16" stroke="#5d6d7e" stroke-width="0.8"/>

  <!-- Rocks around base -->
  <ellipse cx="14" cy="54" rx="4" ry="3" fill="#95a5a6" stroke="#333" stroke-width="1"/>
  <ellipse cx="50" cy="54" rx="5" ry="3.5" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
  <ellipse cx="22" cy="56" rx="3" ry="2" fill="#bdc3c7" stroke="#333" stroke-width="0.8"/>
  <ellipse cx="42" cy="56" rx="3.5" ry="2" fill="#95a5a6" stroke="#333" stroke-width="0.8"/>

  <!-- Moss on rocks -->
  <path d="M 8 52 Q 10 48 12 52" stroke="#27ae60" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 52 52 Q 54 48 56 52" stroke="#27ae60" stroke-width="1.5" fill="none" stroke-linecap="round"/>
