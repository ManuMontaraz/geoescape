<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="4" fill="#111" opacity="0.25" stroke="none"/>

  <!-- Main cabin body -->
  <rect x="14" y="28" width="36" height="24" rx="2" fill="#8B5A2B" stroke="#333" stroke-width="1.5"/>
  <!-- Log lines -->
  <line x1="14" y1="34" x2="50" y2="34" stroke="#5C3A1E" stroke-width="1"/>
  <line x1="14" y1="40" x2="50" y2="40" stroke="#5C3A1E" stroke-width="1"/>
  <line x1="14" y1="46" x2="50" y2="46" stroke="#5C3A1E" stroke-width="1"/>

  <!-- Roof -->
  <path d="M 10 28 L 32 10 L 54 28 Z" fill="#A0522D" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Roof planks -->
  <line x1="18" y1="22" x2="46" y2="22" stroke="#7A3A1A" stroke-width="0.8"/>
  <line x1="14" y1="26" x2="50" y2="26" stroke="#7A3A1A" stroke-width="0.8"/>

  <!-- Chimney -->
  <rect x="40" y="14" width="6" height="10" rx="1" fill="#7A3A1A" stroke="#333" stroke-width="1.2"/>
  <rect x="39" y="12" width="8" height="3" rx="1" fill="#5C3A1E" stroke="#333" stroke-width="1"/>
  <!-- Smoke puffs -->
  <circle cx="42" cy="8" r="2.5" fill="#bdc3c7" opacity="0.7" stroke="none"/>
  <circle cx="44" cy="5" r="1.8" fill="#bdc3c7" opacity="0.5" stroke="none"/>

  <!-- Door -->
  <rect x="27" y="38" width="10" height="14" rx="1" fill="#5C3A1E" stroke="#333" stroke-width="1.2"/>
  <circle cx="34" cy="45" r="1" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>

  <!-- Window left -->
  <rect x="18" y="32" width="6" height="6" rx="1" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <line x1="21" y1="32" x2="21" y2="38" stroke="#333" stroke-width="0.8"/>
  <line x1="18" y1="35" x2="24" y2="35" stroke="#333" stroke-width="0.8"/>

  <!-- Window right -->
  <rect x="40" y="32" width="6" height="6" rx="1" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <line x1="43" y1="32" x2="43" y2="38" stroke="#333" stroke-width="0.8"/>
  <line x1="40" y1="35" x2="46" y2="35" stroke="#333" stroke-width="0.8"/>

  <!-- Foundation stones -->
  <rect x="13" y="51" width="38" height="4" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
</svg>