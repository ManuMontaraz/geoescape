<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="4" fill="#111" opacity="0.25" stroke="none"/>

  <!-- Modern house body -->
  <rect x="16" y="28" width="32" height="22" rx="1" fill="#ecf0f1" stroke="#333" stroke-width="1.5"/>
  <!-- Second floor offset -->
  <rect x="22" y="16" width="20" height="14" rx="1" fill="#bdc3c7" stroke="#333" stroke-width="1.5"/>

  <!-- Flat roof accent -->
  <rect x="14" y="26" width="36" height="3" rx="1" fill="#34495e" stroke="#333" stroke-width="1"/>
  <rect x="20" y="14" width="24" height="3" rx="1" fill="#34495e" stroke="#333" stroke-width="1"/>

  <!-- Large window bottom -->
  <rect x="20" y="34" width="10" height="10" rx="1" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <line x1="25" y1="34" x2="25" y2="44" stroke="#333" stroke-width="0.8"/>
  <line x1="20" y1="39" x2="30" y2="39" stroke="#333" stroke-width="0.8"/>

  <!-- Door -->
  <rect x="34" y="34" width="8" height="16" rx="1" fill="#5C3A1E" stroke="#333" stroke-width="1.2"/>
  <circle cx="39" cy="42" r="0.8" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>

  <!-- Second floor window -->
  <rect x="26" y="20" width="12" height="6" rx="1" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <line x1="32" y1="20" x2="32" y2="26" stroke="#333" stroke-width="0.8"/>
  <line x1="26" y1="23" x2="38" y2="23" stroke="#333" stroke-width="0.8"/>

  <!-- Steps -->
  <rect x="32" y="50" width="12" height="2" rx="0.5" fill="#95a5a6" stroke="#333" stroke-width="0.8"/>
  <rect x="31" y="52" width="14" height="2" rx="0.5" fill="#7f8c8d" stroke="#333" stroke-width="0.8"/>
</svg>