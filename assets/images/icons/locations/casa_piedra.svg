<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="18" ry="4" fill="#111" opacity="0.25" stroke="none"/>

  <!-- Stone wall body -->
  <rect x="14" y="26" width="36" height="26" rx="2" fill="#95a5a6" stroke="#333" stroke-width="1.5"/>
  <!-- Stone blocks pattern -->
  <line x1="14" y1="32" x2="50" y2="32" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="14" y1="38" x2="50" y2="38" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="14" y1="44" x2="50" y2="44" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="26" y1="26" x2="26" y2="32" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="38" y1="26" x2="38" y2="32" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="20" y1="32" x2="20" y2="38" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="32" y1="32" x2="32" y2="38" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="44" y1="32" x2="44" y2="38" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="26" y1="38" x2="26" y2="44" stroke="#7f8c8d" stroke-width="0.8"/>
  <line x1="38" y1="38" x2="38" y2="44" stroke="#7f8c8d" stroke-width="0.8"/>

  <!-- Dark roof -->
  <path d="M 10 26 L 32 10 L 54 26 Z" fill="#34495e" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Wooden door -->
  <rect x="26" y="38" width="12" height="14" rx="1" fill="#5C3A1E" stroke="#333" stroke-width="1.2"/>
  <circle cx="35" cy="45" r="1" fill="#f1c40f" stroke="#333" stroke-width="0.8"/>
  <!-- Door planks -->
  <line x1="29" y1="38" x2="29" y2="52" stroke="#3A2515" stroke-width="0.6"/>
  <line x1="32" y1="38" x2="32" y2="52" stroke="#3A2515" stroke-width="0.6"/>
  <line x1="35" y1="38" x2="35" y2="52" stroke="#3A2515" stroke-width="0.6"/>

  <!-- Small window -->
  <rect x="18" y="30" width="5" height="5" rx="1" fill="#87CEEB" stroke="#333" stroke-width="1"/>
  <line x1="20.5" y1="30" x2="20.5" y2="35" stroke="#333" stroke-width="0.8"/>
  <line x1="18" y1="32.5" x2="23" y2="32.5" stroke="#333" stroke-width="0.8"/>

  <!-- Foundation -->
  <rect x="13" y="51" width="38" height="4" rx="1" fill="#7f8c8d" stroke="#333" stroke-width="1"/>
</svg>