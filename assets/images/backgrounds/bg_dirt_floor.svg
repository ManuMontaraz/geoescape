    <ellipse cx="280" cy="220" rx="70" ry="50"/>
    <ellipse cx="150" cy="250" rx="45" ry="30"/>
  </g>
  <!-- Piedras en el camino -->
  <g fill="#5d4037" stroke="#3e2723" stroke-width="0.5">
    <ellipse cx="30" cy="30" rx="8" ry="5"/>
    <ellipse cx="70" cy="60" rx="6" ry="4"/>
    <ellipse cx="120" cy="40" rx="10" ry="6"/>
    <ellipse cx="180" cy="80" rx="7" ry="4"/>
    <ellipse cx="250" cy="50" rx="9" ry="5"/>
