    <ellipse cx="380" cy="40" rx="8" ry="5"/>
    <ellipse cx="40" cy="120" rx="7" ry="5"/>
    <ellipse cx="100" cy="150" rx="9" ry="6"/>
    <ellipse cx="160" cy="130" rx="6" ry="4"/>
    <ellipse cx="220" cy="160" rx="10" ry="7"/>
    <ellipse cx="290" cy="140" rx="7" ry="5"/>
    <ellipse cx="360" cy="170" rx="8" ry="5"/>
    <ellipse cx="60" cy="220" rx="9" ry="6"/>
    <ellipse cx="140" cy="200" rx="7" ry="4"/>
