  <!-- Grietas tierra -->
  <g stroke="#3e2723" stroke-width="0.8" fill="none" opacity="0.4">
    <path d="M 150 50 L 155 70 L 152 90"/>
    <path d="M 300 120 L 305 140 L 302 160"/>
    <path d="M 80 180 L 85 200 L 82 220"/>
    <path d="M 220 200 L 225 220 L 222 240"/>
