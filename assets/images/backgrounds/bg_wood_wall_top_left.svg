<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de madera (resto) -->
  <rect x="120" y="90" width="280" height="210" fill="#5d4037"/>
  <!-- Tablones suelo horizontales -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="120" y="90" width="280" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="120" y="125" width="280" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="120" y="160" width="280" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="120" y="195" width="280" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="120" y="230" width="280" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="120" y="265" width="280" height="35" fill="#8d6e63" stroke="#3e2723"/>
  </g>

  <!-- Pared vertical izquierda (120x300) -->
  <rect x="0" y="0" width="120" height="300" fill="#6d4c41"/>
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="0" width="40" height="300" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="40" y="0" width="40" height="300" fill="#795548" stroke="#3e2723"/>
    <rect x="80" y="0" width="40" height="300" fill="#8d6e63" stroke="#3e2723"/>
  </g>
  <!-- Clavos pared vertical -->
  <g fill="#3e2723">
    <circle cx="20" cy="20" r="1.5"/><circle cx="20" cy="50" r="1.5"/><circle cx="20" cy="80" r="1.5"/><circle cx="20" cy="110" r="1.5"/><circle cx="20" cy="140" r="1.5"/><circle cx="20" cy="170" r="1.5"/><circle cx="20" cy="200" r="1.5"/><circle cx="20" cy="230" r="1.5"/><circle cx="20" cy="260" r="1.5"/><circle cx="20" cy="290" r="1.5"/>
    <circle cx="60" cy="20" r="1.5"/><circle cx="60" cy="50" r="1.5"/><circle cx="60" cy="80" r="1.5"/><circle cx="60" cy="110" r="1.5"/><circle cx="60" cy="140" r="1.5"/><circle cx="60" cy="170" r="1.5"/><circle cx="60" cy="200" r="1.5"/><circle cx="60" cy="230" r="1.5"/><circle cx="60" cy="260" r="1.5"/><circle cx="60" cy="290" r="1.5"/>
    <circle cx="100" cy="20" r="1.5"/><circle cx="100" cy="50" r="1.5"/><circle cx="100" cy="80" r="1.5"/><circle cx="100" cy="110" r="1.5"/><circle cx="100" cy="140" r="1.5"/><circle cx="100" cy="170" r="1.5"/><circle cx="100" cy="200" r="1.5"/><circle cx="100" cy="230" r="1.5"/><circle cx="100" cy="260" r="1.5"/><circle cx="100" cy="290" r="1.5"/>
  </g>

  <!-- Pared horizontal arriba (400x90) - dibujada DESPUÉS para tapar la esquina solapada -->
  <rect x="0" y="0" width="400" height="90" fill="#6d4c41"/>
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="50" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
    <rect x="100" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="150" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
    <rect x="200" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="250" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
    <rect x="300" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="350" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
  </g>
  <!-- Clavos pared horizontal (solo x>120 para no repetir esquina) -->
  <g fill="#3e2723">
    <circle cx="175" cy="20" r="1.5"/><circle cx="175" cy="45" r="1.5"/><circle cx="175" cy="70" r="1.5"/>
    <circle cx="225" cy="20" r="1.5"/><circle cx="225" cy="45" r="1.5"/><circle cx="225" cy="70" r="1.5"/>
    <circle cx="275" cy="20" r="1.5"/><circle cx="275" cy="45" r="1.5"/><circle cx="275" cy="70" r="1.5"/>
    <circle cx="325" cy="20" r="1.5"/><circle cx="325" cy="45" r="1.5"/><circle cx="325" cy="70" r="1.5"/>
    <circle cx="375" cy="20" r="1.5"/><circle cx="375" cy="45" r="1.5"/><circle cx="375" cy="70" r="1.5"/>
  </g>

  <!-- Líneas divisorias -->
  <line x1="120" y1="90" x2="400" y2="90" stroke="#222" stroke-width="3"/>
  <line x1="120" y1="0" x2="120" y2="300" stroke="#222" stroke-width="3"/>
</svg>
