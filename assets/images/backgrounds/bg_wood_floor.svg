  <g stroke="#3e2723" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 120 15 L 125 25 L 122 35"/>
    <path d="M 280 55 L 285 65 L 282 75"/>
    <path d="M 40 105 L 45 115 L 42 125"/>
    <path d="M 180 155 L 185 165 L 182 175"/>
    <path d="M 300 205 L 305 215 L 302 225"/>
    <path d="M 100 255 L 105 265 L 102 275"/>
  </g>
  <!-- Clavos -->
  <g fill="#7f8c8d" stroke="#555" stroke-width="0.5">
    <circle cx="10" cy="20" r="1.5"/>
    <circle cx="390" cy="20" r="1.5"/>
    <circle cx="10" cy="60" r="1.5"/>
    <circle cx="390" cy="60" r="1.5"/>
    <circle cx="10" cy="100" r="1.5"/>
    <circle cx="390" cy="100" r="1.5"/>
    <circle cx="10" cy="140" r="1.5"/>
    <circle cx="390" cy="140" r="1.5"/>
    <circle cx="10" cy="180" r="1.5"/>
    <circle cx="390" cy="180" r="1.5"/>
    <circle cx="10" cy="220" r="1.5"/>
    <circle cx="390" cy="220" r="1.5"/>
    <circle cx="10" cy="260" r="1.5"/>
    <circle cx="390" cy="260" r="1.5"/>
