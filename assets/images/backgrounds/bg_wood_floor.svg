<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Fondo base madera oscuro -->
  <rect x="0" y="0" width="400" height="300" fill="#5d4037"/>
  <!-- Tablones horizontales -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="0" width="400" height="40" fill="#795548" stroke="#3e2723"/>
    <rect x="0" y="40" width="400" height="40" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="0" y="80" width="400" height="40" fill="#795548" stroke="#3e2723"/>
    <rect x="0" y="120" width="400" height="40" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="0" y="160" width="400" height="40" fill="#795548" stroke="#3e2723"/>
    <rect x="0" y="200" width="400" height="40" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="0" y="240" width="400" height="40" fill="#795548" stroke="#3e2723"/>
    <rect x="0" y="280" width="400" height="20" fill="#8d6e63" stroke="#3e2723"/>
  </g>
  <!-- Nudos de madera -->
  <g fill="#3e2723" opacity="0.6">
