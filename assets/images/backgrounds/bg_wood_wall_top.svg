<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de madera (70% inferior = y:90 a 300) -->
  <rect x="0" y="90" width="400" height="210" fill="#5d4037"/>
  <!-- Tablones suelo -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="90" width="400" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="0" y="125" width="400" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="0" y="160" width="400" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="0" y="195" width="400" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="0" y="230" width="400" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="0" y="265" width="400" height="35" fill="#8d6e63" stroke="#3e2723"/>
  </g>
  <!-- Pared de madera (30% superior = y:0 a 90) -->
  <rect x="0" y="0" width="400" height="90" fill="#6d4c41"/>
  <!-- Tablones pared verticales -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="50" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
    <rect x="100" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="150" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
    <rect x="200" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="250" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
    <rect x="300" y="0" width="50" height="90" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="350" y="0" width="50" height="90" fill="#795548" stroke="#3e2723"/>
  </g>
  <!-- Clavos pared -->
  <g fill="#3e2723">
    <circle cx="25" cy="20" r="1.5"/><circle cx="25" cy="45" r="1.5"/><circle cx="25" cy="70" r="1.5"/>
    <circle cx="75" cy="20" r="1.5"/><circle cx="75" cy="45" r="1.5"/><circle cx="75" cy="70" r="1.5"/>
    <circle cx="125" cy="20" r="1.5"/><circle cx="125" cy="45" r="1.5"/><circle cx="125" cy="70" r="1.5"/>
    <circle cx="175" cy="20" r="1.5"/><circle cx="175" cy="45" r="1.5"/><circle cx="175" cy="70" r="1.5"/>
    <circle cx="225" cy="20" r="1.5"/><circle cx="225" cy="45" r="1.5"/><circle cx="225" cy="70" r="1.5"/>
    <circle cx="275" cy="20" r="1.5"/><circle cx="275" cy="45" r="1.5"/><circle cx="275" cy="70" r="1.5"/>
    <circle cx="325" cy="20" r="1.5"/><circle cx="325" cy="45" r="1.5"/><circle cx="325" cy="70" r="1.5"/>
    <circle cx="375" cy="20" r="1.5"/><circle cx="375" cy="45" r="1.5"/><circle cx="375" cy="70" r="1.5"/>
  </g>
  <!-- Línea divisoria -->
  <line x1="0" y1="90" x2="400" y2="90" stroke="#222" stroke-width="3"/>
</svg>
