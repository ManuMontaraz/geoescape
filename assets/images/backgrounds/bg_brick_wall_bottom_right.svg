    <rect x="150" y="240" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="210" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="270" y="240" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="330" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="390" y="240" width="10" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="0" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="270" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="120" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="180" y="270" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="240" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
