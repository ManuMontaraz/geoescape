<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de ladrillos (resto) -->
  <rect x="0" y="0" width="280" height="210" fill="#8d6e63"/>
