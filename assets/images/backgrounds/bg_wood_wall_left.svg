<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de madera (70% derecha = x:120 a 400) -->
  <rect x="120" y="0" width="280" height="300" fill="#5d4037"/>
  <!-- Tablones suelo horizontales -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="120" y="0" width="280" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="120" y="35" width="280" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="120" y="70" width="280" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="120" y="105" width="280" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="120" y="140" width="280" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="120" y="175" width="280" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="120" y="210" width="280" height="35" fill="#795548" stroke="#3e2723"/>
    <rect x="120" y="245" width="280" height="35" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="120" y="280" width="280" height="20" fill="#795548" stroke="#3e2723"/>
  </g>
  <!-- Pared de madera (30% izquierda = x:0 a 120) -->
  <rect x="0" y="0" width="120" height="300" fill="#6d4c41"/>
  <!-- Tablones pared verticales -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="0" width="40" height="300" fill="#8d6e63" stroke="#3e2723"/>
    <rect x="40" y="0" width="40" height="300" fill="#795548" stroke="#3e2723"/>
    <rect x="80" y="0" width="40" height="300" fill="#8d6e63" stroke="#3e2723"/>
  </g>
  <!-- Clavos pared -->
  <g fill="#3e2723">
    <circle cx="20" cy="20" r="1.5"/><circle cx="20" cy="50" r="1.5"/><circle cx="20" cy="80" r="1.5"/><circle cx="20" cy="110" r="1.5"/><circle cx="20" cy="140" r="1.5"/><circle cx="20" cy="170" r="1.5"/><circle cx="20" cy="200" r="1.5"/><circle cx="20" cy="230" r="1.5"/><circle cx="20" cy="260" r="1.5"/><circle cx="20" cy="290" r="1.5"/>
    <circle cx="60" cy="20" r="1.5"/><circle cx="60" cy="50" r="1.5"/><circle cx="60" cy="80" r="1.5"/><circle cx="60" cy="110" r="1.5"/><circle cx="60" cy="140" r="1.5"/><circle cx="60" cy="170" r="1.5"/><circle cx="60" cy="200" r="1.5"/><circle cx="60" cy="230" r="1.5"/><circle cx="60" cy="260" r="1.5"/><circle cx="60" cy="290" r="1.5"/>
    <circle cx="100" cy="20" r="1.5"/><circle cx="100" cy="50" r="1.5"/><circle cx="100" cy="80" r="1.5"/><circle cx="100" cy="110" r="1.5"/><circle cx="100" cy="140" r="1.5"/><circle cx="100" cy="170" r="1.5"/><circle cx="100" cy="200" r="1.5"/><circle cx="100" cy="230" r="1.5"/><circle cx="100" cy="260" r="1.5"/><circle cx="100" cy="290" r="1.5"/>
  </g>
  <!-- Línea divisoria vertical -->
  <line x1="120" y1="0" x2="120" y2="300" stroke="#222" stroke-width="3"/>
</svg>
