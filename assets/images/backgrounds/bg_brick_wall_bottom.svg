<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo/cielo arriba (70% superior = y:0 a 210) -->
  <rect x="0" y="0" width="400" height="210" fill="#7f8c8d"/>
  <!-- Losetas suelo -->
  <g stroke="#555" stroke-width="2" fill="#95a5a6">
    <rect x="0" y="0" width="80" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="80" y="0" width="100" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="180" y="0" width="90" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="270" y="0" width="130" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="0" y="70" width="120" height="80" fill="#7f8c8d" stroke="#555"/>
    <rect x="120" y="70" width="80" height="80" fill="#95a5a6" stroke="#555"/>
    <rect x="200" y="70" width="100" height="80" fill="#7f8c8d" stroke="#555"/>
    <rect x="300" y="70" width="100" height="80" fill="#95a5a6" stroke="#555"/>
    <rect x="0" y="150" width="90" height="60" fill="#95a5a6" stroke="#555"/>
    <rect x="90" y="150" width="110" height="60" fill="#7f8c8d" stroke="#555"/>
    <rect x="200" y="150" width="80" height="60" fill="#95a5a6" stroke="#555"/>
    <rect x="280" y="150" width="120" height="60" fill="#7f8c8d" stroke="#555"/>
  </g>
  <!-- Pared de ladrillos abajo (30% inferior = y:210 a 300) -->
  <rect x="0" y="210" width="400" height="90" fill="#8d6e63"/>
  <!-- Ladrillos pared -->
  <g stroke="#5d4037" stroke-width="2" fill="#a1887f">
    <rect x="0" y="210" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="210" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="120" y="210" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="180" y="210" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="240" y="210" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="300" y="210" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="360" y="210" width="40" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="-30" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="30" y="240" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="90" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="150" y="240" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="210" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="270" y="240" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="330" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="390" y="240" width="10" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="0" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="270" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="120" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="180" y="270" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="240" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="300" y="270" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="360" y="270" width="40" height="30" fill="#a1887f" stroke="#5d4037"/>
  </g>
  <!-- Línea divisoria -->
  <line x1="0" y1="210" x2="400" y2="210" stroke="#333" stroke-width="3"/>
</svg>
