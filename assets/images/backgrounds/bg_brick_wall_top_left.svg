    <rect x="180" y="0" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="240" y="0" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="300" y="0" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="360" y="0" width="40" height="30" fill="#a1887f" stroke="#5d4037"/>
