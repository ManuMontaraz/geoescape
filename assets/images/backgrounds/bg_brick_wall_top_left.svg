    <rect x="0" y="240" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="0" y="270" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="60" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
