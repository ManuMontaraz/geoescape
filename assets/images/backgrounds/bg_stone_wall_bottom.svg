<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de piedra (70% superior) -->
  <rect x="0" y="0" width="400" height="210" fill="#7f8c8d"/>
  <!-- Losetas suelo -->
  <g stroke="#555" stroke-width="2" fill="#95a5a6">
    <rect x="0" y="0" width="80" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="80" y="0" width="100" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="180" y="0" width="90" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="270" y="0" width="130" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="0" y="70" width="120" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="120" y="70" width="80" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="200" y="70" width="100" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="300" y="70" width="100" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="0" y="140" width="90" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="90" y="140" width="110" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="200" y="140" width="80" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="280" y="140" width="120" height="70" fill="#7f8c8d" stroke="#555"/>
  </g>
  <!-- Grietas -->
  <path d="M 40 40 L 45 60 L 42 80" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 150 120 L 155 140 L 152 160" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 320 30 L 325 50 L 322 70" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Musgo -->
  <ellipse cx="20" cy="20" rx="12" ry="8" fill="#27ae60" opacity="0.3"/>
  <ellipse cx="380" cy="50" rx="10" ry="6" fill="#27ae60" opacity="0.3"/>

  <!-- Pared de piedra (30% inferior = y:210 a 300) -->
  <rect x="0" y="210" width="400" height="90" fill="#5d4037"/>
  <!-- Bloques piedra -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="210" width="80" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="80" y="210" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="180" y="210" width="90" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="270" y="210" width="130" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="0" y="240" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="100" y="240" width="80" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="180" y="240" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="280" y="240" width="120" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="0" y="270" width="90" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="90" y="270" width="110" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="200" y="270" width="100" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="300" y="270" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
  </g>
  <!-- Línea divisoria -->
  <line x1="0" y1="210" x2="400" y2="210" stroke="#222" stroke-width="3"/>
</svg>
