<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de piedra (70% inferior) -->
  <rect x="0" y="90" width="400" height="210" fill="#7f8c8d"/>
  <!-- Losetas suelo -->
  <g stroke="#555" stroke-width="2" fill="#95a5a6">
    <rect x="0" y="90" width="80" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="80" y="90" width="100" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="180" y="90" width="90" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="270" y="90" width="130" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="0" y="160" width="120" height="80" fill="#7f8c8d" stroke="#555"/>
    <rect x="120" y="160" width="80" height="80" fill="#95a5a6" stroke="#555"/>
    <rect x="200" y="160" width="100" height="80" fill="#7f8c8d" stroke="#555"/>
    <rect x="300" y="160" width="100" height="80" fill="#95a5a6" stroke="#555"/>
    <rect x="0" y="240" width="90" height="60" fill="#95a5a6" stroke="#555"/>
    <rect x="90" y="240" width="110" height="60" fill="#7f8c8d" stroke="#555"/>
    <rect x="200" y="240" width="80" height="60" fill="#95a5a6" stroke="#555"/>
    <rect x="280" y="240" width="120" height="60" fill="#7f8c8d" stroke="#555"/>
  </g>
  <!-- Grietas -->
  <path d="M 40 120 L 45 140 L 42 160" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 150 200 L 155 220 L 152 240" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 320 110 L 325 130 L 322 150" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Musgo -->
  <ellipse cx="20" cy="280" rx="12" ry="8" fill="#27ae60" opacity="0.3"/>
  <ellipse cx="380" cy="260" rx="10" ry="6" fill="#27ae60" opacity="0.3"/>

  <!-- Pared de piedra (30% superior = y:0 a 90) -->
  <rect x="0" y="0" width="400" height="90" fill="#5d4037"/>
  <!-- Bloques piedra -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="0" y="0" width="80" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="80" y="0" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="180" y="0" width="90" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="270" y="0" width="130" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="0" y="30" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="100" y="30" width="80" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="180" y="30" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="280" y="30" width="120" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="0" y="60" width="90" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="90" y="60" width="110" height="30" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="200" y="60" width="100" height="30" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="300" y="60" width="100" height="30" fill="#95a5a6" stroke="#3e2723"/>
  </g>
  <!-- Línea divisoria -->
  <line x1="0" y1="90" x2="400" y2="90" stroke="#222" stroke-width="3"/>
</svg>
