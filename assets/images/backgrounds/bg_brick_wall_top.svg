<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de piedra (70% inferior = y:90 a 300) -->
  <rect x="0" y="90" width="400" height="210" fill="#7f8c8d"/>
  <!-- Losetas suelo -->
  <g stroke="#555" stroke-width="2" fill="#95a5a6">
    <rect x="0" y="90" width="80" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="80" y="90" width="100" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="180" y="90" width="90" height="70" fill="#95a5a6" stroke="#555"/>
    <rect x="270" y="90" width="130" height="70" fill="#7f8c8d" stroke="#555"/>
    <rect x="0" y="160" width="120" height="80" fill="#7f8c8d" stroke="#555"/>
    <rect x="120" y="160" width="80" height="80" fill="#95a5a6" stroke="#555"/>
    <rect x="200" y="160" width="100" height="80" fill="#7f8c8d" stroke="#555"/>
    <rect x="300" y="160" width="100" height="80" fill="#95a5a6" stroke="#555"/>
    <rect x="0" y="240" width="90" height="60" fill="#95a5a6" stroke="#555"/>
    <rect x="90" y="240" width="110" height="60" fill="#7f8c8d" stroke="#555"/>
    <rect x="200" y="240" width="80" height="60" fill="#95a5a6" stroke="#555"/>
    <rect x="280" y="240" width="120" height="60" fill="#7f8c8d" stroke="#555"/>
  </g>
  <!-- Grietas suelo -->
  <path d="M 40 120 L 50 140 L 45 160" stroke="#555" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 150 200 L 160 220 L 155 240" stroke="#555" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 320 110 L 330 130 L 325 150" stroke="#555" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Pared de ladrillos (30% superior = y:0 a 90) -->
  <rect x="0" y="0" width="400" height="90" fill="#8d6e63"/>
  <!-- Ladrillos pared -->
  <g stroke="#5d4037" stroke-width="2" fill="#a1887f">
    <rect x="0" y="0" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="0" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="120" y="0" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="180" y="0" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="240" y="0" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="300" y="0" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="360" y="0" width="40" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="-30" y="30" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="30" y="30" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="90" y="30" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="150" y="30" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="210" y="30" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="270" y="30" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="330" y="30" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="390" y="30" width="10" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="0" y="60" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="60" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="120" y="60" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="180" y="60" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="240" y="60" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="300" y="60" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="360" y="60" width="40" height="30" fill="#a1887f" stroke="#5d4037"/>
  </g>
  <!-- Línea divisoria -->
  <line x1="0" y1="90" x2="400" y2="90" stroke="#333" stroke-width="3"/>
</svg>
