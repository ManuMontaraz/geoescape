<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo derecha (70% derecha = x:120 a 400) -->
  <rect x="120" y="0" width="280" height="300" fill="#7f8c8d"/>
  <!-- Losetas suelo -->
  <g stroke="#555" stroke-width="2" fill="#95a5a6">
    <rect x="120" y="0" width="80" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="200" y="0" width="100" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="300" y="0" width="100" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="120" y="75" width="120" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="240" y="75" width="80" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="320" y="75" width="80" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="120" y="150" width="90" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="210" y="150" width="110" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="320" y="150" width="80" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="120" y="225" width="100" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="220" y="225" width="100" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="320" y="225" width="80" height="75" fill="#7f8c8d" stroke="#555"/>
  </g>
  <!-- Pared de ladrillos izquierda (30% izquierda = x:0 a 120) -->
  <rect x="0" y="0" width="120" height="300" fill="#8d6e63"/>
  <!-- Ladrillos pared -->
  <g stroke="#5d4037" stroke-width="2" fill="#a1887f">
    <rect x="0" y="0" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="0" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="0" y="30" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="60" y="30" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="0" y="60" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="60" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="0" y="90" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="60" y="90" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="0" y="120" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="120" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="0" y="150" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="60" y="150" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="0" y="180" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="180" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="0" y="210" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="60" y="210" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="0" y="240" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
    <rect x="60" y="240" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="0" y="270" width="60" height="30" fill="#8d6e63" stroke="#5d4037"/>
    <rect x="60" y="270" width="60" height="30" fill="#a1887f" stroke="#5d4037"/>
  </g>
  <!-- Línea divisoria vertical -->
  <line x1="120" y1="0" x2="120" y2="300" stroke="#333" stroke-width="3"/>
</svg>
