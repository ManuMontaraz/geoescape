<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Suelo de piedra (70% izquierda = x:0 a 280) -->
  <rect x="0" y="0" width="280" height="300" fill="#7f8c8d"/>
  <!-- Losetas suelo -->
  <g stroke="#555" stroke-width="2" fill="#95a5a6">
    <rect x="0" y="0" width="80" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="80" y="0" width="100" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="180" y="0" width="100" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="0" y="75" width="120" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="120" y="75" width="80" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="200" y="75" width="80" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="0" y="150" width="90" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="90" y="150" width="110" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="200" y="150" width="80" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="0" y="225" width="100" height="75" fill="#7f8c8d" stroke="#555"/>
    <rect x="100" y="225" width="100" height="75" fill="#95a5a6" stroke="#555"/>
    <rect x="200" y="225" width="80" height="75" fill="#7f8c8d" stroke="#555"/>
  </g>
  <!-- Grietas -->
  <path d="M 40 40 L 45 60 L 42 80" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 150 120 L 155 140 L 152 160" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 250 200 L 255 220 L 252 240" stroke="#444" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Musgo -->
  <ellipse cx="20" cy="20" rx="10" ry="7" fill="#27ae60" opacity="0.3"/>
  <ellipse cx="100" cy="280" rx="12" ry="8" fill="#27ae60" opacity="0.3"/>

  <!-- Pared de piedra (30% derecha = x:280 a 400) -->
  <rect x="280" y="0" width="120" height="300" fill="#5d4037"/>
  <!-- Bloques piedra -->
  <g stroke="#3e2723" stroke-width="2">
    <rect x="280" y="0" width="60" height="40" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="340" y="0" width="60" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="280" y="40" width="50" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="330" y="40" width="40" height="40" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="370" y="40" width="30" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="280" y="80" width="65" height="40" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="345" y="80" width="55" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="280" y="120" width="60" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="340" y="120" width="60" height="40" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="280" y="160" width="70" height="40" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="350" y="160" width="50" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="280" y="200" width="55" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="335" y="200" width="65" height="40" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="280" y="240" width="75" height="40" fill="#7f8c8d" stroke="#3e2723"/>
    <rect x="355" y="240" width="45" height="40" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="280" y="280" width="60" height="20" fill="#95a5a6" stroke="#3e2723"/>
    <rect x="340" y="280" width="60" height="20" fill="#7f8c8d" stroke="#3e2723"/>
  </g>
  <!-- Línea divisoria vertical -->
  <line x1="280" y1="0" x2="280" y2="300" stroke="#222" stroke-width="3"/>
</svg>
